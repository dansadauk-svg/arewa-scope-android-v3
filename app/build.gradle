plugins {
    id 'com.android.application'
}

android {
    namespace 'com.arewascope.app'
    compileSdk 35

    defaultConfig {
        applicationId 'com.arewascope.app'
        minSdk 23
        targetSdk 35
        versionCode 31
        versionName '1.3.1'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
